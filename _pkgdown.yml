url: https://tidyfun.github.io/tidyfun

template:
  bootstrap: 5
  light-switch: true
  math-rendering: mathjax

reference:
- title: Tidy data wrangling
  desc: Converting, reshaping, and evaluating functional data inside data frames
  contents:
  - tidyfun
  - tf_gather
  - tf_spread
  - tf_nest
  - tf_unnest
  - tf_evaluate.data.frame
- title: Visualization with ggplot2
  desc: >
    `tf_ggplot()` and standard ggplot2 geoms for spaghetti plots, ribbons,
    and more. Specialized geoms for heatmaps, boxplots, and sparklines.
  contents:
  - tf_ggplot
  - is_tf_ggplot
  - "+.tf_ggplot"
  - print.tf_ggplot
  - ggplot_build.tf_ggplot
  - parse_tf_aesthetics
- title: Geoms and stats
  desc: ggplot2 layers for functional data
  contents:
  - geom_spaghetti
  - geom_fboxplot
  - gglasagna
  - ggerrorband
  - geom_capellini
  - autoplot.tf
- title: Display
  desc: Pillar and print formatting for tf columns
  contents:
  - type_sum.tf
- title: Data
  desc: Real-world functional data sets shipped with tidyfun
  contents:
  - chf_df
  - dti_df
articles:
- title: User guides
  desc: End-user articles for working with tidyfun
  contents:
  - x01_tf_Vectors
  - x02_Conversion
  - x03_Data_Wrangling
  - x04_Visualization
  - x06_Registration
- title: Developer Notes
  desc: Contributor and extension guidance
  contents:
  - x05_Advice
navbar:
  type: default
  left:
  - icon: fa-github
    href: https://github.com/tidyfun/tidyfun
    aria-label: GitHub
  - text: Reference
    href: reference/index.html
  - text: Articles
    menu:
    - text: tf-Vectors and Operations
      href: articles/x01_tf_Vectors.html
    - text: Converting data to and from `tf`
      href: articles/x02_Conversion.html
    - text: Data Wrangling
      href: articles/x03_Data_Wrangling.html
    - text: Visualization
      href: articles/x04_Visualization.html
    - text: Curve Registration
      href: articles/x06_Registration.html
  - text: Developer Notes
    menu:
    - text: Developer Notes
      href: articles/x05_Advice.html
development:
  mode: auto
