url: https://tidyfun.github.io/tidyfun

template:
  bootstrap: 5
  light-switch: true
  math-rendering: mathjax

reference:
- title: Tidy data wrangling
  desc: Converting, reshaping, and evaluating functional data inside data frames
  contents:
  - tidyfun
  - tf_gather
  - tf_spread
  - tf_nest
  - tf_unnest
  - tf_evaluate.data.frame
- title: Visualization with ggplot2
  desc: >
    `tf_ggplot()` and standard ggplot2 geoms for spaghetti plots, ribbons,
    and more. Specialized geoms for heatmaps, boxplots, and sparklines.
  contents:
  - tf_ggplot
  - is_tf_ggplot
  - "+.tf_ggplot"
  - print.tf_ggplot
  - ggplot_build.tf_ggplot
  - parse_tf_aesthetics
- title: Geoms and stats
  desc: ggplot2 layers for functional data
  contents:
  - geom_spaghetti
  - geom_fboxplot
  - gglasagna
  - ggerrorband
  - geom_capellini
  - autoplot.tf
- title: Display
  desc: Pillar and print formatting for tf columns
  contents:
  - type_sum.tf
- title: Data
  desc: Real-world functional data sets shipped with tidyfun
  contents:
  - chf_df
  - dti_df
- title: "Constructors & converters (from tf)"
  desc: Defining and converting functional data objects (re-exported from tf)
  contents:
  - tf::tfd
  - tf::as.tfd
  - tf::tfb
  - tf::as.tfb
  - tf::as.data.frame.tf
  - tf::tfb_spline
  - tf::tfb_fpc
  - tf::fpc_wsvd
  - tf::tf_rebase
- title: "Evaluating, indexing & re-arranging (from tf)"
  desc: Accessing, appending, evaluating, splitting & combining functional data objects
  contents:
  - tf::tfbrackets
  - tf::tf_approx_linear
  - tf::tf_evaluate
  - tf::tf_interpolate
  - tf::tf_splitcombine
- title: "Arithmetic, logical and summary functions (from tf)"
  desc: Functionality for computing with and comparing functional data
  contents:
  - tf::tfgroupgenerics
  - tf::tfsummaries
  - tf::functionwise
  - tf::tf_depth
  - tf::tf_order
  - tf::tf_minmax
  - tf::fivenum
- title: "Differentiation, integration and smoothing (from tf)"
  contents:
  - tf::tf_derive
  - tf::tf_integrate
  - tf::tf_smooth
- title: "Registering and warping (from tf)"
  desc: Functions for registering and warping functional data
  contents:
  - tf::tf_register
  - tf::tf_estimate_warps
  - tf::tf_registration
  - tf::tf_align
  - tf::tf_landmarks_extrema
  - tf::tf_warp
  - tf::tf_invert
- title: "Visualization & display (from tf)"
  desc: Base-R graphics and print formats for tf objects
  contents:
  - tf::plot.tf
  - tf::print.tf
  - tf::prep_plotting_arg
- title: "Querying functional data (from tf)"
  desc: Locating functional features like peaks or zero-crossings
  contents:
  - tf::tf_where
  - tf::tf_zoom
- title: "Utilities & random generation (from tf)"
  contents:
  - tf::tf_arg
  - tf::tf_rgp
  - tf::tf_jiggle
  - tf::in_range
  - tf::ensure_list
  - tf::unique_id
  - tf::vctrs
  - tf::tf
- title: "Data (from tf)"
  desc: Functional data sets from tf
  contents:
  - tf::gait
  - tf::growth
  - tf::pinch
articles:
- title: User guides
  desc: End-user articles for working with tidyfun
  contents:
  - x01_tf_Vectors
  - x02_Conversion
  - x03_Data_Wrangling
  - x04_Visualization
  - x06_Registration
- title: Developer Notes
  desc: Contributor and extension guidance
  contents:
  - x05_Advice
navbar:
  type: default
  left:
  - icon: fa-github
    href: https://github.com/tidyfun/tidyfun
    aria-label: GitHub
  - text: Reference
    href: reference/index.html
  - text: Articles
    menu:
    - text: tf-Vectors and Operations
      href: articles/x01_tf_Vectors.html
    - text: Converting data to and from `tf`
      href: articles/x02_Conversion.html
    - text: Data Wrangling
      href: articles/x03_Data_Wrangling.html
    - text: Visualization
      href: articles/x04_Visualization.html
    - text: Curve Registration
      href: articles/x06_Registration.html
  - text: Developer Notes
    menu:
    - text: Developer Notes
      href: articles/x05_Advice.html
development:
  mode: auto
